<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Water Tank Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(to right,#2193b0,#6dd5ed);color:#fff;text-align:center;padding:2em}
.tank-status,.controls{background:rgba(0,0,0,.2);padding:1.5em;border-radius:10px;margin:1em auto;max-width:400px}
.level{font-size:2.5em;font-weight:bold}
.chart-container{width:90%;max-width:700px;margin:2em auto;background:#ffffff22;border-radius:12px;padding:1em}
input{width:80px;padding:.5em;border:none;border-radius:8px}
</style></head>
<body>
<h1>Smart Water Tank Monitor</h1>
<div class="controls"><label>Tank Height (cm): </label><input type="number" id="tankHeight" value="10" min="1"></div>
<div class="tank-status"><p>Current Water Level:</p><div class="level" id="waterLevel">-- cm</div><p id="percentageLevel">-- % full</p></div>
<div class="chart-container"><canvas id="levelChart"></canvas></div>
<script>
let tankHeight=parseFloat(document.getElementById("tankHeight").value);
const levelDisplay=document.getElementById("waterLevel");
const percentDisplay=document.getElementById("percentageLevel");
const chartData={labels:[],datasets:[{label:"Water Level (cm)",data:[],fill:false,borderColor:"#fff",backgroundColor:"#fff",tension:.2}]};
const levelChart=new Chart(document.getElementById("levelChart"),{
type:"line",data:chartData,
options:{scales:{x:{ticks:{color:"#fff"}},y:{beginAtZero:true,max:tankHeight,ticks:{color:"#fff"}}},plugins:{legend:{labels:{color:"#fff"}}}}
});
document.getElementById("tankHeight").addEventListener("change",()=>{
tankHeight=parseFloat(document.getElementById("tankHeight").value);
levelChart.options.scales.y.max=tankHeight; if(level>tankHeight) level=tankHeight; levelChart.update();
});
let level=0,filling=true;
function fetchWaterLevel(){
 if(filling){level+=0.5;if(level>=tankHeight){level=tankHeight;filling=false;}}
 else{level-=0.5;if(level<=0){level=0;filling=true;}}
 const percentage=((level/tankHeight)*100).toFixed(1);
 levelDisplay.textContent=level.toFixed(1)+" cm";
 percentDisplay.textContent=percentage+" % full";
 const now=new Date().toLocaleTimeString();
 if(chartData.labels.length>20){chartData.labels.shift();chartData.datasets[0].data.shift();}
 chartData.labels.push(now); chartData.datasets[0].data.push(level); levelChart.update();
}
window.onload=fetchWaterLevel;
setInterval(fetchWaterLevel,1000);
</script></body></html>
